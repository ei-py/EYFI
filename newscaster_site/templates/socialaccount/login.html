
{% extends "news/base.html" %}
{% load i18n %}

{% block content %}
<div class="login-page-container" style="max-width: 400px; margin: 4rem auto; padding: 2rem; background-color: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h1 style="text-align: center; color: #1e293b; font-family: 'Merriweather', serif; font-size: 1.8rem; margin-bottom: 0.5rem;">{% trans "Confirm Sign In" %}</h1>
    <p style="text-align: center; color: #475569; margin-bottom: 2rem;">{% blocktrans with provider.name as provider %}You are about to sign in using your {{ provider }} account.{% endblocktrans %}</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="new-btn-login" style="width: 100%; text-align: center; background-color: #2563eb; color: white; padding: 0.75rem 1rem; border-radius: 5px; text-decoration: none; display: block; font-weight: 500; border: none; cursor: pointer; font-size: 1rem;">{% trans "Continue" %}</button>
    </form>
</div>
{% endblock %}
