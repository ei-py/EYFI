{% if articles %}
<ul>
    {% for article in articles %}
    <li>
        <a href="{% url 'article_detail' article.id %}">
            {{ article.translated_subject }}
        </a>
    </li>
    {% endfor %}
</ul>
{% else %}
<p class="no-results">{% if query %}No results found for "{{ query }}"{% else %}Start typing to search...{% endif %}</p>
{% endif %}
